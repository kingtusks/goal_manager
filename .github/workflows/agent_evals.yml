name: Run Evals

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  evals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start containers
        run: docker compose up --build -d

      - name: Wait for containers to be ready
        run: sleep 30

      - name: Run evals
        run: bash shell_scripts/run_evals.sh