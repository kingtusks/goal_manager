name: Run Evals

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  evals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start containers
        run: docker compose up --build -d

      - name: Wait for containers to be ready
        run: |
          echo "Waiting for containers to be ready."
          sleep 30
          docker compose ps

      - name: Run evals
        run: bash shell_scripts/runevals.sh